# PostgreSQL Multi-DB Configuration (PRD 2.5)
# Single PostgreSQL server with 4 logical databases: primary, queue, cache, cable
# https://guides.rubyonrails.org/active_record_multiple_databases.html
#
# Migration directories:
#   primary -> db/migrate/
#   queue   -> db/queue_migrate/
#   cache   -> db/cache_migrate/
#   cable   -> db/cable_migrate/

default: &default
  adapter: postgresql
  encoding: unicode
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USER", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "password") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  primary: &primary_dev
    <<: *default
    database: guild_board_development
  queue:
    <<: *primary_dev
    database: guild_board_development_queue
    migrations_paths: db/queue_migrate
  cache:
    <<: *primary_dev
    database: guild_board_development_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *primary_dev
    database: guild_board_development_cable
    migrations_paths: db/cable_migrate

test:
  primary: &primary_test
    <<: *default
    database: guild_board_test
  queue:
    <<: *primary_test
    database: guild_board_test_queue
    migrations_paths: db/queue_migrate
  cache:
    <<: *primary_test
    database: guild_board_test_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *primary_test
    database: guild_board_test_cable
    migrations_paths: db/cable_migrate

production:
  primary: &primary_prod
    <<: *default
    database: guild_board_production
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    username: <%= ENV.fetch("DB_USER", "guild_board") %>
    password: <%= ENV["DB_PASSWORD"] %>
  queue:
    <<: *primary_prod
    database: guild_board_production_queue
    migrations_paths: db/queue_migrate
  cache:
    <<: *primary_prod
    database: guild_board_production_cache
    migrations_paths: db/cache_migrate
  cable:
    <<: *primary_prod
    database: guild_board_production_cable
    migrations_paths: db/cable_migrate
