# Action Cable Configuration
# SolidCable: DB-backed adapter (no Redis required)
# Database: cable DB (config/database.yml → cable section)

development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds

test:
  adapter: async

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
